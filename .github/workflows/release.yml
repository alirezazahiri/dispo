name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-linux-flatpak:
    name: Linux (Flatpak)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          apt-get update
          apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        run: |
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          wails build -tags webkit2_41 -platform linux/amd64

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dispo-x86_64.flatpak
          manifest-path: build/linux/flatpak/io.github.alirezazahiri.dispo.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: dispo-x86_64.flatpak

  build-windows:
    name: Windows (NSIS)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        shell: pwsh
        run: |
          $env:Path = "$env:Path;$env:USERPROFILE\go\bin"
          wails build -platform windows/amd64 -nsis

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/*-installer.exe

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build application
        run: |
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          wails build -platform darwin/universal

      - name: Create macOS archive
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent dispo.app ../../../dispo-macos-universal.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dispo-macos-universal.zip

  release:
    name: Publish GitHub Release
    needs:
      - build-linux-flatpak
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/linux-flatpak/dispo-x86_64.flatpak
            release-artifacts/windows-installer/*
            release-artifacts/macos-app/dispo-macos-universal.zip
